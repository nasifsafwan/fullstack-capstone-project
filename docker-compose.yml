version: "3.9"

services:
  mongo:
    image: mongo:7
    container_name: giftlink-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
      - ./data:/seed

  backend:
    build:
      context: ./backend
    container_name: giftlink-backend
    restart: unless-stopped
    environment:
      PORT: 5000
      MONGODB_URI: mongodb://mongo:27017
      MONGODB_DB_NAME: giftlink
      JWT_SECRET: change-me
      CORS_ORIGIN: http://localhost:8080
    ports:
      - "5000:5000"
    depends_on:
      - mongo

  frontend:
    build:
      context: ./frontend
    container_name: giftlink-frontend
    restart: unless-stopped
    ports:
      - "8080:80"
    depends_on:
      - backend

volumes:
  mongo_data:

